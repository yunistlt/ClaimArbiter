<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ClaimArbiter Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --sidebar-width: 240px;
      --sidebar-bg: #1a1f2e;
      --sidebar-active: #2d6a4f;
      --accent: #2d6a4f;
    }

    body { background: #f1f3f6; }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-width);
      min-height: 100vh;
      background: var(--sidebar-bg);
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
    }

    #sidebar .brand {
      padding: 1.35rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    #sidebar .brand h5 {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      margin: 0;
      letter-spacing: .02em;
    }
    #sidebar .brand small { color: rgba(255,255,255,.45); font-size: .7rem; }

    #sidebar nav { flex: 1; padding: .75rem 0; }

    #sidebar .nav-link {
      color: rgba(255,255,255,.65);
      padding: .6rem 1.25rem;
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .875rem;
      transition: background .15s, color .15s;
    }
    #sidebar .nav-link:hover,
    #sidebar .nav-link.active {
      background: var(--sidebar-active);
      color: #fff;
    }
    #sidebar .nav-link i { font-size: 1rem; }

    /* Main content */
    #main {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      background: #fff;
      border-bottom: 1px solid #e2e6ea;
      padding: .75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #topbar h6 { margin: 0; font-weight: 600; color: #343a40; }
    #topbar .badge-pending { background: #ffc107; color: #343a40; }

    #content { padding: 1.75rem; flex: 1; }

    /* Cards */
    .stat-card { border: none; border-radius: .75rem; }
    .stat-card .card-body { padding: 1.25rem 1.5rem; }
    .stat-card .stat-icon {
      width: 3rem; height: 3rem;
      border-radius: .6rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .stat-card .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .stat-card .stat-label { font-size: .78rem; color: #6c757d; margin-top: .15rem; }

    /* Table helpers */
    .table th { font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; color: #6c757d; border-top: none; }
    .table td { vertical-align: middle; font-size: .875rem; }

    /* Status badges */
    .badge-pending  { background: #fff3cd; color: #856404; border: 1px solid #ffc10733; }
    .badge-approved { background: #d1e7dd; color: #0f5132; border: 1px solid #0f513233; }
    .badge-rejected { background: #f8d7da; color: #842029; border: 1px solid #84202933; }

    /* Content textarea */
    .content-box {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: .5rem;
      padding: 1rem;
      white-space: pre-wrap;
      font-size: .85rem;
      max-height: 450px;
      overflow-y: auto;
      line-height: 1.6;
    }

    /* Alert override */
    .flash { border-radius: .5rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="brand">
    <h5><i class="bi bi-shield-fill-check me-1"></i> ClaimArbiter</h5>
    <small>Панель администратора</small>
  </div>
  <nav>
    <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Дашборд
    </a>
    <a href="/queue" class="nav-link {% if '/queue' in request.url.path %}active{% endif %}">
      <i class="bi bi-list-task"></i> Очередь задач
    </a>
    <a href="/rules" class="nav-link {% if '/rules' in request.url.path %}active{% endif %}">
      <i class="bi bi-sliders"></i> Правила
    </a>
    <a href="/users" class="nav-link {% if '/users' in request.url.path %}active{% endif %}">
      <i class="bi bi-people"></i> Пользователи
    </a>
  </nav>
</div>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <h6>{% block page_title %}{% endblock %}</h6>
    <small class="text-muted"><i class="bi bi-circle-fill text-success me-1" style="font-size:.5rem"></i>ЗМК-Юрист</small>
  </div>
  <div id="content">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
